{{define "dashboard.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}
<div class="bg-white rounded-xl shadow-md p-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Личный кабинет</h1>
    <p class="text-gray-600 mb-6">Вы вошли как <strong>{{.username}}</strong> ({{.role}}).</p>
    <div class="flex flex-wrap gap-3 mb-8">
        <a href="/notes" class="inline-block bg-indigo-600 text-white px-5 py-2.5 rounded-md hover:bg-indigo-700 transition font-medium">Мои заметки</a>
        {{if eq .role "admin"}}
        <a href="/admin/users" class="inline-block border border-indigo-600 text-indigo-600 px-5 py-2.5 rounded-md hover:bg-indigo-50 transition font-medium">Управление пользователями</a>
        {{end}}
    </div>
    <hr class="my-6">
    <form method="post" action="/delete-account" onsubmit="return confirm('Вы уверены? Все ваши данные будут удалены безвозвратно.')">
        <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition">Удалить аккаунт</button>
    </form>
</div>
{{end}}
