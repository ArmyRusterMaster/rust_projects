{{define "login.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-2 text-center text-gray-800">Вход</h1>
    <p class="text-center text-gray-500 mb-6">Войдите в свой аккаунт</p>
    <form method="post" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Имя пользователя</label>
            <input type="text" name="username" required
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Пароль</label>
            <input type="password" name="password" required
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-medium">
            Войти
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
        Нет аккаунта? <a href="/register" class="text-indigo-600 hover:underline">Зарегистрироваться</a>
    </p>
</div>
{{end}}
