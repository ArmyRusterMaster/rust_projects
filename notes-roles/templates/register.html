{{define "register.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-2 text-center text-gray-800">Регистрация</h1>
    <p class="text-center text-gray-500 mb-6">Создайте новый аккаунт</p>
    <form method="post" action="/register" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Имя пользователя</label>
            <input type="text" name="username" required
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Пароль (мин. 6 символов)</label>
            <input type="password" name="password" required minlength="6"
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2">
        </div>
        <fieldset class="mt-4">
            <legend class="block text-sm font-medium text-gray-700 mb-2">Тип аккаунта</legend>
            <div class="flex items-center gap-6">
                <label class="inline-flex items-center">
                    <input type="radio" name="role" value="user" checked class="form-radio h-4 w-4 text-indigo-600">
                    <span class="ml-2 text-sm text-gray-700">Обычный пользователь</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" name="role" value="admin" class="form-radio h-4 w-4 text-indigo-600">
                    <span class="ml-2 text-sm text-gray-700">Администратор</span>
                </label>
            </div>
        </fieldset>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-medium">
            Зарегистрироваться
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
        Уже есть аккаунт? <a href="/login" class="text-indigo-600 hover:underline">Войти</a>
    </p>
</div>
{{end}}
